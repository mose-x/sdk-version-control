name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ====== Windows ======
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails & go-winres
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          go install github.com/tc-hib/go-winres@latest

      - name: Generate Windows Resources
        run: |
          go-winres make --arch amd64 --out resource --no-suffix
          Rename-Item resource resource.syso
        shell: pwsh

      - name: Build
        run: wails build -nopackage -o SDKVersionControl.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SDKVersionControl_windows_amd64
          path: build/bin/SDKVersionControl.exe

  # ====== macOS ======
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build .app
        run: |
          wails build -platform darwin/${{ matrix.arch }} \
            -o SDKVersionControl

      - name: Create DMG
        run: |
          hdiutil create -volname "SDKVersionControl" \
            -srcfolder build/bin/SDKVersionControl.app \
            -ov -format UDZO \
            build/bin/SDKVersionControl_darwin_${{ matrix.arch }}.dmg

      - name: Extract binary for self-update
        run: |
          cp build/bin/SDKVersionControl.app/Contents/MacOS/SDKVersionControl \
            build/bin/SDKVersionControl_darwin_${{ matrix.arch }}.bin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SDKVersionControl_darwin_${{ matrix.arch }}_dmg
          path: build/bin/SDKVersionControl_darwin_${{ matrix.arch }}.dmg

      - name: Upload update binary
        uses: actions/upload-artifact@v4
        with:
          name: SDKVersionControl_darwin_${{ matrix.arch }}_update
          path: build/bin/SDKVersionControl_darwin_${{ matrix.arch }}.bin

  # ====== Linux ======
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -o SDKVersionControl

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SDKVersionControl_linux_amd64
          path: build/bin/SDKVersionControl

  # ====== Release ======
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
